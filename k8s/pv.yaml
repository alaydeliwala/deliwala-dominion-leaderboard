apiVersion: v1
kind: PersistentVolume
metadata:
  name: dominion-db-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/bad/k8s/dominion-leaderboard
    type: DirectoryOrCreate
  claimRef:
    namespace: default
    name: dominion-db-pvc
